services:
  frisbee-mv:
    build:
      context: .
      args:
        NEXT_PUBLIC_SHEETS_API_KEY: ${NEXT_PUBLIC_SHEETS_API_KEY}
        NEXT_PUBLIC_SHEET_ID: ${NEXT_PUBLIC_SHEET_ID}
        NEXT_PUBLIC_ADMIN_PASSWORD: ${NEXT_PUBLIC_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped
